name: Build RPM

on:
  workflow_dispatch:
    inputs:
      nginx_version:
        description: "Nginx version, e.g. 1.29.6"
        required: true
        type: string
        default: '1.29.6'

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
      GITHUB_TOKEN: ${{ secrets.amsternl }}
    container: quay.io/centos/centos:stream10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install build dependencies
        shell: bash
        run: |
          set -euo pipefail
          dnf -y install dnf-plugins-core
          dnf config-manager --set-enabled crb || true
          dnf -y install epel-release || true
          dnf -y install \
            rpm-build \
            rpmdevtools \
            redhat-rpm-config \
            gcc \
            make \
            curl \
            systemd \
            zlib-devel \
            pcre2-devel \
            openssl-devel \
            cmark-devel

      - name: Prepare sources
        shell: bash
        run: |
          set -euo pipefail
          ver="${{ inputs.nginx_version }}"
          sed -i -E "s/^%define base_version .*/%define base_version ${ver}/" SPECS/nginx.spec
          sed -i -E "s/^Version: [0-9.]+[+]/Version: ${ver}+/" SPECS/nginx.spec
          sed -i -E "s/^BASE_VERSION=.*/BASE_VERSION=${ver}/" SPECS/Makefile
          rm -f SOURCES/nginx-*.tar.gz
          curl -fL -o "SOURCES/nginx-${ver}.tar.gz" "https://nginx.org/download/nginx-${ver}.tar.gz"

      - name: Create Release
        id: create_release
        uses: actions/create-release@latest
        with:
            tag_name: ${{ github.ref }}
            release_name: Release ${{ github.ref }}
            body: |
              Changes in this Release
              - Create RPM
              - Upload Source RPM
            draft: false
            prerelease: true
        continue-on-error: true
              
      - name: Build RPM
        id: rpm_build
        shell: bash
        run: |
          set -euo pipefail
          rm -rf ngx_markdown_filter_module
          tar -xzf SOURCES/ngx_markdown_filter_module.tar.gz -C .
          rpmbuild -ba \
            --define "_topdir $(pwd)" \
            --define "_module_dir $(pwd)/ngx_markdown_filter_module" \
            SPECS/nginx.spec

      - name: Upload artifacts
        id: upload_artifacts
        uses: actions/upload-artifact@v6
        with:
          #nginx-rpms-${{ inputs.nginx_version }}
          #path: ${{ steps.rpm.outputs.rpm_dir_path }}
          name: Binary RPM ${{ inputs.nginx_version }} 
          path: |
            RPMS/**/*.rpm
            SRPMS/*.src.rpm
        continue-on-error: true

      - name: Echo Build Outputs
        shell: bash
        run: |
            printf "%s\n" "${{ steps.rpm_build.outputs }}"
            printf "%s\n" "${{ steps.create_release.outputs }}"
            printf "%s\n" "${{ steps.upload_artifacts.outputs }}"
        continue-on-error: true

      - name: Upload Release Asset
        id: upload-release-asset 
        uses: actions/upload-release-asset@v1
        env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
             upload_url: ${{ steps.create_release.outputs.upload_url }} # This pulls from the CREATE RELEASE step above, referencing it's ID to get its outputs object, which include a `upload_url`. See this blog post for more info: https://jasonet.co/posts/new-features-of-github-actions/#passing-data-to-future-steps 
             asset_path: ${{ steps.rpm_build.outputs.source_rpm_path }}
             asset_name: ${{ steps.rpm_build.outputs.source_rpm_name }}
             asset_content_type: ${{ steps.rpm_build.outputs.rpm_content_type }}
        continue-on-error: true

      - name: Upload to Release
        uses: softprops/action-gh-release@master
        with:
          files: |
            RPMS/**/*.rpm
            SRPMS/*.src.rpm
#android-recovery/out/target/product/${{ github.event.inputs.DEVICE_NAME }}/${{ env.BUILD_TARGET_NAME }}.img
#android-recovery/out/target/product/${{ github.event.inputs.DEVICE_NAME }}/PBRP*.zip
#android-recovery/out/target/product/${{ github.event.inputs.DEVICE_NAME }}/ramdisk-recovery.*
          #name: Unofficial PBRP for ${{ github.event.inputs.DEVICE_NAME }} // ${{ env.BUILD_DATE }}
          tag_name: ${{ github.run_id }}
          #body: |
            # Build: ${{ inputs.MANIFEST_BRANCH }}
            #Device: [Device Tree/Branch](${{ inputs.DEVICE_TREE }}/tree/${{ inputs.DEVICE_TREE_BRANCH }})
            #Commit: Most recent [commit](${{ inputs.DEVICE_TREE }}/commit/${{ env.COMMIT_ID }}) during building.
