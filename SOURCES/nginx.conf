# For more information on configuration, see:
#   * Official English Documentation: http://nginx.org/en/docs/
#   * Official Russian Documentation: http://nginx.org/ru/docs/

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log notice;
pid /run/nginx.pid;

# Load dynamic modules. See /usr/share/doc/nginx/README.dynamic.
include /etc/nginx/modules-enabled/*.conf;

events {
    worker_connections 1024;
}

http {
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile            on;
#    tcp_nopush          on;
    keepalive_timeout   65;
#    types_hash_max_size 4096;

    include             /etc/nginx/mime.types;
    default_type        application/octet-stream;

    # Load modular configuration files from the /etc/nginx/conf.d directory.
    # See http://nginx.org/en/docs/ngx_core_module.html#include
    # for more information.
    include /etc/nginx/conf.d/*.conf;
    include /etc/nginx/sites-enabled/*;

#    server {
#        listen       80;
#        listen       [::]:80;
#        server_name  _;
#        root         /usr/share/nginx/html;
        # Load configuration files for the default server block.
#        include /etc/nginx/default.d/*.conf;
#    }

server {
        listen       10.30.30.33:80;
        server_name  amster.vados.ru;
        include /etc/nginx/default.d/*.conf;

    if ($host = amster.vados.ru) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

#    if ($host = amster.vados.ru) {
#        return 301 https://$host$request_uri;
#    }
#    return 301 https://$server_name$request_uri;


}

# Settings for a TLS enabled server.
    server {
        listen       10.30.30.33:443 ssl;
#        listen       [::]:443 ssl;
        http2        on;
        server_name  amster.vados.ru;
#        root         /usr/share/nginx/html;
#        ssl_certificate "/etc/pki/nginx/nginx-01.crt";
#        ssl_certificate_key "/etc/pki/nginx/private/nginx-01.key";
#        ssl_session_cache shared:SSL:1m;
#        ssl_session_timeout  10m;
#        ssl_ciphers PROFILE=SYSTEM;
#        ssl_prefer_server_ciphers on;

#    include /etc/letsencrypt/options-ssl-nginx.conf;

    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    ssl_certificate /etc/letsencrypt/live/amster.vados.ru/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/amster.vados.ru/privkey.pem; # managed by Certbot

        # Load configuration files for the default server block.
       include /etc/nginx/default.d/*.conf;

}

}
